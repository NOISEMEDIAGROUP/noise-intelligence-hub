<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noise Intelligence</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Reddit+Mono:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #F7F7F5;
    --surface: #FFFFFF;
    --surface2: #F0EFED;
    --border: #E4E3E0;
    --text: #1B1B1B;
    --text-muted: #7A7A78;
    --accent: #C73C1E;
    --accent-light: rgba(199,60,30,0.08);
    --green: #2D8A4E;
    --green-bg: rgba(45,138,78,0.08);
    --blue: #2B6CB0;
    --blue-bg: rgba(43,108,176,0.06);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
    --shadow-lg: 0 4px 20px rgba(0,0,0,0.08);
  }
  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ============ PAGE 0: LOGIN / SELECT USER ============ */
  #page0 {
    height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #1B1B1B;
    position: relative; overflow: hidden;
  }
  #page0::before {
    content: ''; position: absolute; top: -40%; left: -20%;
    width: 140%; height: 140%;
    background: radial-gradient(ellipse at 30% 20%, rgba(199,60,30,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(199,60,30,0.08) 0%, transparent 50%);
    pointer-events: none;
  }
  .login-container {
    position: relative; z-index: 1;
    text-align: center; width: 100%; max-width: 680px; padding: 0 24px;
  }
  .login-logo {
    font-family: 'Reddit Mono', monospace;
    font-size: 28px; font-weight: 700; color: #fff;
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 4px;
  }
  .login-logo .ldot { color: var(--accent); }
  .login-sub {
    font-size: 13px; color: rgba(255,255,255,0.4);
    letter-spacing: 0.5px; margin-bottom: 40px;
  }
  .login-prompt {
    font-family: 'Reddit Mono', monospace;
    font-size: 11px; color: rgba(255,255,255,0.5);
    text-transform: uppercase; letter-spacing: 2px;
    margin-bottom: 20px;
  }
  .team-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    max-height: 460px;
    overflow-y: auto;
    padding: 4px;
  }
  .team-card {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .team-card:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.2);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .team-card:active { transform: translateY(0); }
  .tc-av {
    width: 42px; height: 42px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Reddit Mono', monospace;
    font-size: 13px; font-weight: 700; color: white;
    flex-shrink: 0;
  }
  .tc-info { text-align: left; }
  .tc-name { font-size: 14px; font-weight: 600; color: #fff; }
  .tc-role { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 1px; }

  .team-grid::-webkit-scrollbar { width: 4px; }
  .team-grid::-webkit-scrollbar-track { background: transparent; }
  .team-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

  /* ============ SHARED HEADER (pages 1 & 2) ============ */
  .header {
    background: var(--surface);
    padding: 0 24px; height: 52px;
    display: flex; align-items: center; gap: 14px;
    border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    z-index: 100;
    position: fixed; top: 0; left: 0; right: 0;
  }
  .header.hidden { display: none; }
  .logo {
    width: 34px; height: 34px; background: #1B1B1B;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Reddit Mono', monospace;
    font-weight: 700; font-size: 13px; color: white;
    letter-spacing: -1px; cursor: pointer;
  }
  .logo .dot { color: var(--accent); }
  .header-title {
    font-family: 'Reddit Mono', monospace;
    font-size: 13px; font-weight: 600; color: var(--text);
    text-transform: uppercase; letter-spacing: 1.2px; cursor: pointer;
  }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .header-btn {
    padding: 6px 14px; border-radius: 7px;
    font-family: 'Reddit Mono', monospace; font-weight: 600;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px;
    cursor: pointer; transition: all 0.2s;
    border: 1px solid var(--border); color: var(--text-muted); background: transparent;
  }
  .header-btn:hover { border-color: var(--accent); color: var(--text); }
  .hdr-user {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    padding: 4px 10px 4px 4px; border-radius: 20px;
    border: 1px solid var(--border); transition: all 0.2s;
  }
  .hdr-user:hover { border-color: var(--accent); }
  .hdr-user-av {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Reddit Mono', monospace;
    font-size: 9px; font-weight: 700; color: white;
  }
  .hdr-user-name {
    font-size: 11px; font-weight: 600; color: var(--text);
  }

  /* ============ PAGE SYSTEM ============ */
  .page { display: none; }
  .page.active { display: flex; }
  #page1, #page2 { height: calc(100vh - 52px); margin-top: 52px; }

  /* ============ PAGE 1: HUB / WELCOME ============ */
  #page1 { flex-direction: row; }

  .p1-sidebar {
    width: 260px; background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .p1-tabs { display: flex; border-bottom: 1px solid var(--border); }
  .p1-tab {
    flex: 1; padding: 10px 6px; text-align: center;
    font-family: 'Reddit Mono', monospace;
    font-size: 9px; text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--text-muted); font-weight: 600; cursor: pointer;
    border-bottom: 2px solid transparent; transition: all 0.2s;
  }
  .p1-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .p1-tab:hover:not(.active) { color: var(--text); }
  .p1-search { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .p1-search input {
    width: 100%; padding: 8px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 12px; outline: none;
  }
  .p1-search input:focus { border-color: var(--accent); }
  .p1-search input::placeholder { color: var(--text-muted); }
  .p1-list { flex: 1; overflow-y: auto; padding: 4px 0; }

  /* Sidebar items */
  .si { padding: 9px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: background 0.15s; border-left: 3px solid transparent; }
  .si:hover { background: var(--surface2); }
  .si-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .si.rdy .si-dot { background: var(--green); }
  .si.inv .si-dot { background: var(--blue); }
  .si-name { font-size: 12.5px; font-weight: 500; }
  .si-badge { margin-left: auto; padding: 2px 6px; border-radius: 4px; font-family: 'Reddit Mono', monospace; font-size: 8px; font-weight: 600; text-transform: uppercase; }
  .b-r { background: var(--green-bg); color: var(--green); }
  .b-i { background: var(--blue-bg); color: var(--blue); }
  .si-team { padding: 8px 16px; display: flex; align-items: center; gap: 10px; }
  .si-team-av { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Reddit Mono', monospace; font-size: 10px; font-weight: 700; color: white; flex-shrink: 0; }
  .si-team-n { font-size: 12px; font-weight: 500; }
  .si-team-r { font-size: 10px; color: var(--text-muted); }
  .si-conn { padding: 9px 16px; display: flex; align-items: center; gap: 10px; }
  .si-conn-i { font-size: 16px; width: 26px; text-align: center; }
  .si-conn-n { font-size: 12px; font-weight: 500; }
  .si-conn-d { font-size: 10px; color: var(--text-muted); }
  .si-conn-s { margin-left: auto; padding: 2px 7px; border-radius: 4px; font-size: 8px; font-weight: 600; font-family: 'Reddit Mono', monospace; text-transform: uppercase; background: var(--green-bg); color: var(--green); }
  .mem-item { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .mem-text { font-size: 12.5px; line-height: 1.5; color: var(--text); }
  .mem-meta { font-size: 10px; color: var(--text-muted); margin-top: 4px; display: flex; justify-content: space-between; }
  .mem-del { cursor: pointer; color: var(--accent); font-weight: 700; padding: 0 4px; }

  /* Hub chat area */
  .p1-main { flex: 1; display: flex; flex-direction: column; padding: 0; overflow: hidden; min-height: 0; }
  .hub-chat-area { flex: 1; display: flex; flex-direction: column; max-width: 700px; width: 100%; margin: 0 auto; padding: 0 24px; min-height: 0; overflow: hidden; }
  .hub-msgs { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; padding: 24px 0; scroll-behavior: smooth; min-height: 0; }
  .hub-input-bar { padding: 16px 0 24px; position: relative; flex-shrink: 0; }
  .hub-input-bar .wi { width: 100%; padding: 15px 56px 15px 20px; }
  .hub-input-bar .wi-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); margin-top: -4px; }

  /* Thread bar */
  .thread-bar { display: flex; align-items: center; gap: 8px; padding: 12px 0 0; flex-shrink: 0; overflow-x: auto; }
  .thread-bar::-webkit-scrollbar { height: 0; }
  .thread-chip {
    padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 600;
    font-family: 'Reddit Mono', monospace; cursor: pointer; white-space: nowrap;
    border: 1px solid var(--border); background: var(--surface); color: var(--text-muted);
    transition: all 0.2s; flex-shrink: 0;
  }
  .thread-chip:hover { background: var(--surface2); color: var(--text); }
  .thread-chip.active { background: var(--text); color: white; border-color: var(--text); }
  .thread-chip.new-thread { border-style: dashed; color: var(--accent); border-color: var(--accent); background: var(--accent-light); }
  .thread-chip.new-thread:hover { background: var(--accent); color: white; }
  .thread-client { font-size: 9px; color: var(--accent); margin-left: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .modal { background: var(--surface); border-radius: 16px; padding: 28px; width: 440px; max-width: 90vw; box-shadow: 0 8px 40px rgba(0,0,0,0.15); }
  .modal h3 { font-family: 'Reddit Mono', monospace; font-size: 16px; margin-bottom: 6px; }
  .modal p { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.5; }
  .modal input { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; margin-bottom: 10px; outline: none; font-family: 'Reddit Mono', monospace; }
  .modal input:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
  .modal-btns button { padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; }
  .modal-btns .btn-cancel { background: var(--surface2); color: var(--text); }
  .modal-btns .btn-save { background: var(--accent); color: white; }
  .ai-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; font-family: 'Reddit Mono', monospace; margin-left: 6px; }
  .ai-on { background: rgba(45,138,78,0.1); color: #2D8A4E; }
  .ai-off { background: var(--surface2); color: var(--text-muted); }
  .wi {
    width: 100%; padding: 15px 56px 15px 20px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; font-size: 14px; color: var(--text); outline: none;
    box-shadow: var(--shadow-md); transition: border-color 0.2s, box-shadow 0.2s;
  }
  .wi:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(199,60,30,0.08), var(--shadow-md); }
  .wi::placeholder { color: var(--text-muted); }
  .wi-btn {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    width: 38px; height: 38px; border-radius: 10px;
    background: var(--accent); border: none; color: white;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .wi-btn:hover { background: #a82e15; }
  .wi-btn svg { width: 16px; height: 16px; }

  /* ============ PAGE 2: WORKSPACE ============ */
  #page2 { flex-direction: row; }

  /* Chat panel */
  .p2-chat {
    width: 400px; display: flex; flex-direction: column;
    border-right: 1px solid var(--border); background: var(--surface); flex-shrink: 0;
  }
  .p2-ch { padding: 10px 16px; border-bottom: 1px solid var(--border); font-family: 'Reddit Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); font-weight: 600; }
  .p2-msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }

  .msg { display: flex; gap: 10px; max-width: 88%; animation: fu 0.25s ease; }
  @keyframes fu { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
  .msg-u { align-self: flex-end; flex-direction: row-reverse; }
  .m-av { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; margin-top: 2px; }
  .m-av-b { background: #1B1B1B; color: white; font-family: 'Reddit Mono', monospace; }
  .m-av-u { color: white; font-family: 'Reddit Mono', monospace; }
  .m-body { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.65; }
  .msg-u .m-body { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
  .msg-b .m-body { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg-b .m-body strong { color: #1B1B1B; }
  .m-body p { margin: 6px 0; }
  .m-body ul, .m-body ol { margin: 6px 0 6px 18px; }
  .m-body li { margin: 3px 0; }

  .typing { display: flex; gap: 5px; padding: 5px 0; }
  .typing span { width: 7px; height: 7px; background: var(--text-muted); border-radius: 50%; animation: bn 1.4s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bn { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-4px); } }

  .p2-in { padding: 12px 16px; border-top: 1px solid var(--border); }
  .p2-ir { display: flex; gap: 8px; }
  .p2-ir input { flex: 1; padding: 12px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 14px; outline: none; }
  .p2-ir input:focus { border-color: var(--accent); }
  .p2-ir input::placeholder { color: var(--text-muted); }
  .p2-ir button { padding: 10px 16px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: 600; font-size: 12px; cursor: pointer; }
  .p2-ir button:hover { background: #a82e15; }

  /* Document panel */
  .p2-doc { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }
  .p2-dt {
    padding: 8px 16px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .dt-tab { padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; color: var(--text-muted); background: transparent; }
  .dt-tab.active { background: var(--surface2); color: var(--text); border-color: var(--border); }
  .dt-tab:hover:not(.active) { color: var(--text); }
  .dt-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }
  .dt-btn {
    padding: 5px 10px; border-radius: 6px; font-size: 10px; font-weight: 600;
    font-family: 'Reddit Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px;
    cursor: pointer; border: 1px solid var(--border); color: var(--text-muted);
    background: transparent; transition: all 0.2s; display: flex; align-items: center; gap: 4px;
  }
  .dt-btn:hover { border-color: var(--accent); color: var(--text); }
  .dt-btn.gd { background: #4285F4; color: white; border-color: #4285F4; }
  .dt-btn.gd:hover { background: #3367D6; }
  .dt-btn.gs { background: #0F9D58; color: white; border-color: #0F9D58; }
  .dt-btn.gs:hover { background: #0B8043; }
  .dt-btn.gsl { background: #F4B400; color: #1B1B1B; border-color: #F4B400; }

  .p2-dc { flex: 1; overflow-y: auto; padding: 28px 40px; display: flex; justify-content: center; }
  .doc-paper {
    width: 100%; max-width: 700px; min-height: 500px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; box-shadow: var(--shadow-md);
    padding: 44px 52px; font-size: 13px; line-height: 1.8; outline: none;
  }
  .doc-paper:focus { border-color: var(--accent); }
  .doc-paper h1 { font-family: 'Reddit Mono', monospace; font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .doc-paper h2 { font-family: 'Reddit Mono', monospace; font-size: 15px; font-weight: 600; margin: 18px 0 6px; border-bottom: 1px solid var(--border); padding-bottom: 3px; }
  .doc-paper h3 { font-size: 13px; font-weight: 600; margin: 12px 0 4px; }
  .doc-paper .dm { font-size: 11px; color: var(--text-muted); margin-bottom: 18px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .doc-paper ul { margin: 6px 0 6px 20px; }
  .doc-paper li { margin-bottom: 3px; }
  .doc-paper table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 12px; }
  .doc-paper th, .doc-paper td { padding: 7px 10px; text-align: left; border: 1px solid var(--border); }
  .doc-paper th { background: var(--surface2); font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .de { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 350px; color: var(--text-muted); text-align: center; }
  .de-i { font-size: 44px; margin-bottom: 14px; opacity: 0.3; }
  .de h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .de p { font-size: 12px; max-width: 280px; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<!-- HEADER (hidden on login page) -->
<div class="header hidden" id="mainHeader">
  <div class="logo" onclick="goPage(1)">NM<span class="dot">.</span></div>
  <span class="header-title" onclick="goPage(1)">Noise Intelligence</span>
  <div class="header-right">
    <button class="header-btn" onclick="goPage(1)">Hub</button>
    <button class="header-btn" onclick="goPage(2)">Workspace</button>
    <button class="header-btn" onclick="showSettings()" title="AI Settings" style="font-size:16px;padding:6px 10px;">&#9881;</button>
    <div class="hdr-user" id="hdrUser" onclick="goPage(0)"></div>
  </div>
</div>

<!-- PAGE 0: SELECT USER -->
<div class="page active" id="page0">
  <div class="login-container">
    <div class="login-logo">NOISE INTELLIGENCE<span class="ldot">.</span></div>
    <div class="login-sub">Agency Knowledge Hub</div>
    <div class="login-prompt">Select your profile to continue</div>
    <div class="team-grid" id="teamGrid"></div>
  </div>
</div>

<!-- PAGE 1: HUB -->
<div class="page" id="page1">
  <div class="p1-sidebar">
    <div class="p1-tabs">
      <div class="p1-tab active" onclick="swTab('clients')">Clients</div>
      <div class="p1-tab" onclick="swTab('team')">Team</div>
      <div class="p1-tab" onclick="swTab('connectors')">Connectors</div>
      <div class="p1-tab" onclick="swTab('memory')">Memory</div>
    </div>
    <div class="p1-search"><input type="text" id="sbS" placeholder="Search clients..." oninput="rSb(this.value)"></div>
    <div class="p1-list" id="sbL"></div>
  </div>
  <div class="p1-main">
    <div class="hub-chat-area">
      <div class="thread-bar" id="threadBar"></div>
      <div class="hub-msgs" id="hubChat"></div>

/* ============ STATE ============ */
let currentUser = null;
let sbTab = 'clients';

/* ============ PERSISTENT MEMORY ============ */
const STORE_KEY = 'noise_intelligence';
function loadStore() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch(e) { return {}; }
}
function saveStore(data) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(data)); } catch(e) {}
}

// Chat history per user
function saveChatHistory(userName, html) {
  var store = loadStore();
  if (!store.chats) store.chats = {};
  store.chats[userName] = html;
  saveStore(store);
}
function loadChatHistory(userName) {
  var store = loadStore();
  return (store.chats && store.chats[userName]) || '';
}

// Memory notes per user
function getMemories(userName) {
  var store = loadStore();
  if (!store.memories) store.memories = {};
  return store.memories[userName] || [];
}
function addMemory(userName, note) {
  var store = loadStore();
  if (!store.memories) store.memories = {};
  if (!store.memories[userName]) store.memories[userName] = [];
  store.memories[userName].push({ text: note, time: new Date().toISOString() });
  saveStore(store);
}
function deleteMemory(userName, index) {
  var store = loadStore();
  if (store.memories && store.memories[userName]) {
    store.memories[userName].splice(index, 1);
    saveStore(store);
  }
}
function getAllMemories() {
  var store = loadStore();
  return store.memories || {};
}

// Get memory context string for AI system prompt
function getMemoryContext() {
  if (!currentUser) return '';
  var mems = getMemories(currentUser.name);
  var globalMems = getMemories('_global');
  var all = globalMems.concat(mems);
  if (all.length === 0) return '';
  return '\n\nSAVED MEMORIES:\n' + all.map(function(m) { return '- ' + m.text; }).join('\n');
}

/* ============ THREAD SYSTEM ============ */
var currentThreadId = null;

function getUserThreads(userName) {
  var store = loadStore();
  if (!store.threads) store.threads = {};
  if (!store.threads[userName]) store.threads[userName] = [];
  return store.threads[userName];
}

function saveUserThreads(userName, threads) {
  var store = loadStore();
  if (!store.threads) store.threads = {};
  store.threads[userName] = threads;
  saveStore(store);
}

function createThread(userName, label, client) {
  var threads = getUserThreads(userName);
  var thread = {
    id: 'th_' + Date.now(),
    label: label || 'New chat',
    client: client || null,
    html: '',
    created: new Date().toISOString()
  };
  threads.unshift(thread);
  saveUserThreads(userName, threads);
  return thread;
}

function saveCurrentThread() {
  if (!currentUser || !currentThreadId) return;
  var threads = getUserThreads(currentUser.name);
  var th = threads.find(function(t) { return t.id === currentThreadId; });
  if (th) {
    th.html = document.getElementById('hubChat').innerHTML;
    saveUserThreads(currentUser.name, threads);
  }
}

function switchThread(threadId) {
  // Save current thread first
  saveCurrentThread();
  conversationHistory = [];

  var threads = getUserThreads(currentUser.name);
  var th = threads.find(function(t) { return t.id === threadId; });
  if (!th) return;

  currentThreadId = th.id;
  var hc = document.getElementById('hubChat');
  hc.innerHTML = th.html || '';
  hc.scrollTop = hc.scrollHeight;
  renderThreadBar();
}

function startNewThread(label, client) {
  if (!currentUser) return;
  saveCurrentThread();
  conversationHistory = [];
  var th = createThread(currentUser.name, label, client);
  currentThreadId = th.id;
  var hc = document.getElementById('hubChat');
  hc.innerHTML = '';
  var greeting = client
    ? 'Starting a new thread for <strong>' + client + '</strong>. What do you need?'
    : 'New thread started. What are you working on?';
  addMsgTo(hc, greeting, false);
  renderThreadBar();
}

function promptNewThread() {
  var label = prompt('Thread name (e.g. "Thortful Q2 Campaign", "Team 1-1s"):');
  if (!label) return;
  // Try to match a client name
  var client = null;
  var ll = label.toLowerCase();
  var cm = CL.find(function(c) { return ll.includes(c.n.toLowerCase()); });
  if (cm) client = cm.n;
  startNewThread(label, client);
}

function deleteThread(threadId, ev) {
  ev.stopPropagation();
  if (!currentUser) return;
  var threads = getUserThreads(currentUser.name);
  if (threads.length <= 1) return; // Keep at least one
  threads = threads.filter(function(t) { return t.id !== threadId; });
  saveUserThreads(currentUser.name, threads);
  if (currentThreadId === threadId) {
    currentThreadId = threads[0].id;
    var hc = document.getElementById('hubChat');
    hc.innerHTML = threads[0].html || '';
    hc.scrollTop = hc.scrollHeight;
  }
  renderThreadBar();
}

function renderThreadBar() {
  if (!currentUser) return;
  var threads = getUserThreads(currentUser.name);
  var bar = document.getElementById('threadBar');
  var html = '<div class="thread-chip new-thread" onclick="promptNewThread()">+ New</div>';
  threads.forEach(function(th) {
    var active = th.id === currentThreadId ? ' active' : '';
    var clientTag = th.client ? '<span class="thread-client">' + th.client + '</span>' : '';
    html += '<div class="thread-chip' + active + '" onclick="switchThread(\'' + th.id + '\')" title="' + th.label + '">'
      + th.label + clientTag
      + (threads.length > 1 ? '<span style="margin-left:6px;opacity:0.4;font-size:9px;" onclick="deleteThread(\'' + th.id + '\', event)">&times;</span>' : '')
      + '</div>';
  });
  bar.innerHTML = html;
}

function initThreadsForUser(userName) {
  var threads = getUserThreads(userName);
  if (threads.length === 0) {
    // Migrate existing chat history into a "General" thread
    var saved = loadChatHistory(userName);
    var th = {
      id: 'th_' + Date.now(),
      label: 'General',
      client: null,
      html: saved || '',
      created: new Date().toISOString()
    };
    threads.push(th);
    saveUserThreads(userName, threads);
  }
  currentThreadId = threads[0].id;
  return threads[0];
}

/* ============ PAGE 0: LOGIN ============ */
function renderLogin() {
  const g = document.getElementById('teamGrid');
  g.innerHTML = '';
  TEAM.forEach(t => {
    const d = document.createElement('div');
    d.className = 'team-card';
    d.onclick = () => selectUser(t);
    d.innerHTML = `<div class="tc-av" style="background:${t.color}">${t.init}</div><div class="tc-info"><div class="tc-name">${t.name}</div><div class="tc-role">${t.role}</div></div>`;
    g.appendChild(d);
  });
}
renderLogin();

function selectUser(u) {
  // Save outgoing user's thread
  if (currentUser) saveCurrentThread();
  currentUser = u;
  conversationHistory = [];
  var hubChatEl = document.getElementById('hubChat');
  hubChatEl.innerHTML = '';
  document.getElementById('chat').innerHTML = '';
  document.getElementById('docC').style.display = 'none';
  document.getElementById('docE').style.display = '';
  // Set up header
  document.getElementById('mainHeader').classList.remove('hidden');
  document.getElementById('hdrUser').innerHTML = '<div class="hdr-user-av" style="background:' + u.color + '">' + u.init + '</div><span class="hdr-user-name">' + u.name + '</span>';
  goPage(1);
  // Init threads and load the first one
  var firstThread = initThreadsForUser(u.name);
  if (firstThread.html) {
    hubChatEl.innerHTML = firstThread.html;
    hubChatEl.scrollTop = hubChatEl.scrollHeight;
    addMsgTo(hubChatEl, 'Welcome back, ' + u.name.split(' ')[0] + '!', false);
  } else {
    addMsgTo(hubChatEl, 'Hey ' + u.name.split(' ')[0] + '! What are you working on today?', false);
  }
  renderThreadBar();
  // Refresh sidebar if on memory tab
  if (sbTab === 'memory') rSb('');
}

/* ============ PAGE NAV ============ */
function goPage(n) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page'+n).classList.add('active');
  if (n===0) { document.getElementById('mainHeader').classList.add('hidden'); return; }
  document.getElementById('mainHeader').classList.remove('hidden');
  if (n===1) document.getElementById('wI').focus();
  if (n===2) document.getElementById('cI').focus();
}

/* ============ SIDEBAR ============ */
function swTab(tab) {
  sbTab = tab;

    s.placeholder = 'Add a note...';
  } else {
    s.placeholder = tab==='clients'?'Search clients...':tab==='team'?'Search team...':'Search connectors...';
  }
  s.value = ''; rSb('');
}

function rSb(q) {
  q = q || '';
  var el = document.getElementById('sbL');
  el.innerHTML = '';
  var ql = q.toLowerCase();

  if (sbTab==='clients') {
    CL.filter(function(c) { return c.n.toLowerCase().includes(ql); }).forEach(function(c) {
      var d = document.createElement('div');
      d.className = 'si ' + (c.s==='r'?'rdy':'inv');
      d.onclick = function() {
        // Find or create a thread for this client
        var threads = getUserThreads(currentUser.name);
        var existing = threads.find(function(t) { return t.client === c.n; });
        if (existing) { switchThread(existing.id); }
        else { startNewThread(c.n, c.n); }
        document.getElementById('wI').value = 'Tell me about ' + c.n;
        hubSend();
      };
      d.innerHTML = '<span class="si-dot"></span><span class="si-name">' + c.n + '</span><span class="si-badge ' + (c.s==='r'?'b-r':'b-i') + '">' + (c.s==='r'?'Ready':'Inventoried') + '</span>';
      el.appendChild(d);
    });
  } else if (sbTab==='team') {
    TEAM.filter(function(t) { return t.name.toLowerCase().includes(ql); }).forEach(function(t) {
      var d = document.createElement('div');
      d.className = 'si-team';
      d.innerHTML = '<div class="si-team-av" style="background:' + t.color + '">' + t.init + '</div><div><div class="si-team-n">' + t.name + '</div><div class="si-team-r">' + t.role + '</div></div>';
      el.appendChild(d);
    });
  } else if (sbTab==='memory') {
    renderMemoryList(el, ql);
  } else {
    CONN.filter(function(c) { return c.n.toLowerCase().includes(ql); }).forEach(function(c) {
      var d = document.createElement('div');
      d.className = 'si-conn';
      d.innerHTML = '<span class="si-conn-i">' + c.i + '</span><div><div class="si-conn-n">' + c.n + '</div><div class="si-conn-d">' + c.d + '</div></div><span class="si-conn-s">Connected</span>';
      el.appendChild(d);
    });
  }
}

function renderMemoryList(el, filter) {
  if (!currentUser) return;
  var mems = getMemories(currentUser.name);
  var globalMems = getMemories('_global');

  if (mems.length === 0 && globalMems.length === 0) {
    el.innerHTML = '<div style="padding:16px;color:var(--text-muted);font-size:12px;line-height:1.6;">No memories saved yet.<br><br>Tell the bot to <strong>"remember that..."</strong> or type a note in the search bar above and press Enter to save it.</div>';
    return;
  }

  if (globalMems.length > 0) {
    var gh = document.createElement('div');
    gh.style.cssText = 'padding:8px 12px;font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;';
    gh.textContent = 'Shared';
    el.appendChild(gh);
    globalMems.forEach(function(m, i) {
      if (filter && !m.text.toLowerCase().includes(filter)) return;
      var d = document.createElement('div');
      d.className = 'mem-item';
      d.innerHTML = '<div class="mem-text">' + m.text + '</div><div class="mem-meta">' + new Date(m.time).toLocaleDateString('en-GB',{day:'numeric',month:'short'}) + ' <span class="mem-del" onclick="deleteMemory(\'_global\',' + i + ');rSb();">x</span></div>';
      el.appendChild(d);
    });
  }

  if (mems.length > 0) {
    var ph = document.createElement('div');
    ph.style.cssText = 'padding:8px 12px;font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;';
    ph.textContent = currentUser.name.split(' ')[0] + '\'s Notes';
    el.appendChild(ph);
    mems.forEach(function(m, i) {
      if (filter && !m.text.toLowerCase().includes(filter)) return;
      var d = document.createElement('div');
      d.className = 'mem-item';
      d.innerHTML = '<div class="mem-text">' + m.text + '</div><div class="mem-meta">' + new Date(m.time).toLocaleDateString('en-GB',{day:'numeric',month:'short'}) + ' <span class="mem-del" onclick="deleteMemory(\'' + currentUser.name + '\',' + i + ');rSb();">x</span></div>';
      el.appendChild(d);
    });
  }
}

// Allow adding memories from the search bar when on Memory tab

document.getElementById('wI').addEventListener('keypress', function(e) { if (e.key==='Enter') hubSend(); });
async function hubSend() {
  var input = document.getElementById('wI');
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  var hc = document.getElementById('hubChat');

  // Handle "remember" commands locally
  var remMatch = text.match(/^remember\s+(that\s+)?(.+)/i);
  if (remMatch) {
    var note = remMatch[2];
    addMemory(currentUser ? currentUser.name : '_global', note);
    addMsgTo(hc, text, true);
    addMsgTo(hc, 'Got it — I\'ll remember that. You can see all saved memories in the Memory tab on the left.', false);
    saveCurrentThread();
    if (sbTab === 'memory') rSb('');
    return;
  }

  // Handle "forget" / clear memory
  if (text.match(/^(forget|clear memory|clear all|delete memory)/i)) {
    var store = loadStore();
    if (store.memories && currentUser) { store.memories[currentUser.name] = []; saveStore(store); }
    addMsgTo(hc, text, true);
    addMsgTo(hc, 'Done — your memories have been cleared.', false);
    saveCurrentThread();
    if (sbTab === 'memory') rSb('');
    return;
  }

  addMsgTo(hc, text, true);
  addTypingTo(hc);
  var resp = await processMsg(text);
  removeTyping();
  addMsgTo(hc, resp.chat, false);

  // Save chat to localStorage after every message
  if (currentUser) saveCurrentThread();

  if (resp.doc) {
    showDoc(resp.doc);
    goPage(2);
    var wc = document.getElementById('chat');
    addMsgTo(wc, text, true);
    addMsgTo(wc, resp.chat, false);
  }
}

async function callClaude(userMsg) {
  conversationHistory.push({ role: 'user', content: userMsg });
  if (conversationHistory.length > 20) conversationHistory = conversationHistory.slice(-20);
  try {
    var reply = await aiCall(buildSystemPrompt(), conversationHistory, 400);
    if (!reply) return null;
    conversationHistory.push({ role: 'assistant', content: reply });

    // Check if Claude returned a doc request (JSON)
    try {
      var trimmed = reply.trim();
      if (trimmed.startsWith('{') && trimmed.includes('doc_type')) {
        var docReq = JSON.parse(trimmed);
        var dcn = docReq.client || 'Client';
        var dcc = '';
        var fcm = CL.find(function(c) { return c.n.toLowerCase() === dcn.toLowerCase(); });
        if (fcm) { dcn = fcm.n; dcc = fcm.cat || ''; }

        // SECOND CALL: Claude writes the actual document content
        var writePrompt = docWriterPrompt(docReq.doc_type);
        var writeMsg = 'Write a ' + docReq.doc_type + ' for ' + dcn + (dcc ? ' (' + dcc + ')' : '') + '. Original request from user: "' + userMsg + '". Return ONLY the HTML content, nothing else.';
        if (docReq.variant) writeMsg += ' Email type: ' + docReq.variant + '.';
        if (docReq.topic) writeMsg += ' Topic: ' + docReq.topic + '.';

        var docHtml = await aiCall(writePrompt, [{ role: 'user', content: writeMsg }], 1500);

        // Fallback to template if AI doc generation fails
        if (!docHtml) {
          if (docReq.doc_type === 'email') docHtml = buildEmail(dcn, dcc, docReq.variant || 'general');
          else if (docReq.doc_type === 'brief') docHtml = buildBrief(dcn, dcc || 'TBC');
          else if (docReq.doc_type === 'social') docHtml = buildSocial(dcn, dcc);
          else if (docReq.doc_type === 'proposal') docHtml = buildProposal(dcn);
          else if (docReq.doc_type === 'cost') docHtml = buildCost(dcn);
          else if (docReq.doc_type === 'report') docHtml = buildReport(dcn);
          else if (docReq.doc_type === 'agenda') docHtml = buildAgenda(dcn);
          else if (docReq.doc_type === 'presentation') docHtml = buildPresentation(dcn, dcc, docReq.topic || '');
        }

        if (docHtml) {
          var chatMsg = 'Done! I\'ve written a ' + docReq.doc_type + ' for ' + dcn + ' — it\'s in the document panel. Edit and export when ready.';
          conversationHistory[conversationHistory.length - 1].content = chatMsg;
          return { chat: chatMsg, doc: docHtml };
        }
      }
    } catch(e) {}
    return { chat: reply, doc: null };
  } catch(e) {
    console.error('Claude API error:', e);
    return null;
  }
}

function triggerDownload(blob, filename) {
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* PDF Export */
function exportPDF() {
  var dc = document.getElementById('docC');
  if (dc.style.display==='none') { alert('Generate a document first.'); return; }
  var title = getDocTitle();
  // Create a clean printable container
  var wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;top:0;left:0;width:800px;padding:40px;background:white;z-index:9999;font-family:Montserrat,sans-serif;font-size:13px;line-height:1.7;color:#1B1B1B;';
  wrap.innerHTML = dc.innerHTML;
  document.body.appendChild(wrap);
  html2canvas(wrap, { scale: 2, useCORS: true }).then(function(canvas) {
    document.body.removeChild(wrap);
    var pdf = new jspdf.jsPDF('p', 'mm', 'a4');
    var imgW = 210; // A4 width in mm
    var imgH = canvas.height * imgW / canvas.width;
    var pageH = 297;
    var y = 0;
    while (y < imgH) {
      if (y > 0) pdf.addPage();
      pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, -y, imgW, imgH);
      y += pageH;
    }
    pdf.save(title + '.pdf');
  });
}

/* PPTX Export */
function exportPPTX() {
  var dc = document.getElementById('docC');
  if (dc.style.display==='none') { alert('Generate a document first.'); return; }
  var title = getDocTitle();
  var pptx = new PptxGenJS();
  pptx.author = currentUser ? currentUser.name : 'Noise Intelligence';
  pptx.company = 'Noise Media';
  pptx.title = title;

  // Title slide
  var slide1 = pptx.addSlide();
  slide1.background = { color: '1B1B1B' };
  var h1 = dc.querySelector('h1');
  slide1.addText(h1 ? h1.textContent : title, { x: 0.8, y: 1.5, w: 8.4, h: 1.5, fontSize: 28, color: 'FFFFFF', fontFace: 'Calibri', bold: true });
  var dm = dc.querySelector('.dm');
  if (dm) slide1.addText(dm.textContent, { x: 0.8, y: 3.0, w: 8.4, h: 0.6, fontSize: 12, color: '999999', fontFace: 'Calibri' });
  slide1.addText('NOISE MEDIA', { x: 0.8, y: 4.5, w: 3, h: 0.4, fontSize: 10, color: 'C73C1E', fontFace: 'Calibri', bold: true });

  // Content slides — one per h2 section
  var sections = dc.querySelectorAll('h2');
  sections.forEach(function(h2) {
    var slide = pptx.addSlide();
    slide.addText(h2.textContent, { x: 0.5, y: 0.3, w: 9, h: 0.7, fontSize: 22, color: '1B1B1B', fontFace: 'Calibri', bold: true });
    // Gather content until next h2
    var content = [];
    var el = h2.nextElementSibling;
    while (el && el.tagName !== 'H2') {
      if (el.tagName === 'TABLE') {
        var rows = [];
        el.querySelectorAll('tr').forEach(function(tr) {
          var cells = [];
          tr.querySelectorAll('th,td').forEach(function(td) { cells.push({ text: td.textContent, options: { fontSize: 9, color: '333333', fontFace: 'Calibri', bold: td.tagName === 'TH', fill: td.tagName === 'TH' ? { color: 'F0F0F0' } : undefined } }); });
          rows.push(cells);
        });
        if (rows.length > 0) {
          slide.addTable(rows, { x: 0.5, y: 1.2, w: 9, colW: Array(rows[0].length).fill(9/rows[0].length), border: { pt: 0.5, color: 'CCCCCC' }, autoPage: true });
        }
      } else {
        content.push(el.textContent);
      }
      el = el.nextElementSibling;
    }
    if (content.length > 0) {
      slide.addText(content.join('\n'), { x: 0.5, y: 1.2, w: 9, h: 4, fontSize: 11, color: '444444', fontFace: 'Calibri', valign: 'top', wrap: true });
    }
  });

  pptx.writeFile({ fileName: title + '.pptx' });
}

/* --- Main response function --- */
function getResponse(q) {
  const ql = q.toLowerCase();
  const un = uName();
  const cm = findClient(ql);
  const cn = cm ? cm.n : 'Client';
  const cc = cm ? cm.cat : '';

  // ===== DOCUMENT GENERATORS =====
  if (ql.match(/generate.*brief|create.*brief|write.*brief|content brief|creative brief/))
    return { chat: 'I\'ve put together a content brief for <strong>' + cn + '</strong> in the document panel. You can edit it directly and export when ready.', doc: buildBrief(cn, cc||'TBC') };

  if (ql.match(/email|write.*to\s|send.*to\s|draft.*to\s|message.*to/)) {
    const type = ql.match(/intro|onboard|welcome/) ? 'intro' : ql.match(/follow.?up|check.?in/) ? 'followup' : ql.match(/update|status|progress/) ? 'update' : 'general';
    return { chat: 'I\'ve drafted an email for <strong>' + cn + '</strong> in the document panel. Edit the bits in brackets and you\'re good to go.', doc: buildEmail(cn, cc, type) };
  }

  if (ql.match(/social|caption|post.*for|instagram|tiktok|reel|content.*cal|copy.*for/))
    return { chat: 'Social copy for <strong>' + cn + '</strong> is in the doc panel — 3 posts covering awareness, education, and UGC with scheduling suggestions.', doc: buildSocial(cn, cc) };

  if (ql.match(/presentation|ppt|pptx|slide|deck|pitch.*deck/))
    return { chat: 'Presentation for <strong>' + cn + '</strong> is ready in the document panel — full Noise-branded deck with strategy, creative, channel plan, and timeline. Edit the content, then hit .pptx to export.', doc: buildPresentation(cn, cc) };

  if (ql.match(/proposal|pitch|scope.*work|sow/))
    return { chat: 'Proposal for <strong>' + cn + '</strong> is ready — includes services, pricing tiers, and next steps. Edit and export to share.', doc: buildProposal(cn) };

  if (ql.match(/agenda|meeting.*note|call.*prep|kick.?off/))
    return { chat: 'Meeting agenda for <strong>' + cn + '</strong> is in the document panel. Add the date and any specific talking points.', doc: buildAgenda(cn) };

  if (ql.match(/cost.*alloc|budget.*estimate|cost.*estimate|budget.*break|pricing|quote/))
    return { chat: 'Cost allocation for <strong>' + cn + '</strong> is in the doc panel with team rates and a full breakdown.', doc: buildCost(cn) };

  if (ql.match(/report|quarterly|monthly report|performance/))
    return { chat: 'Report template for <strong>' + cn + '</strong> is ready. Fill in the metrics from your campaign data and export.', doc: buildReport(cn) };

  // ===== CONVERSATIONAL Q&A =====
  const rdy = CL.filter(c=>c.s==='r'), inv = CL.filter(c=>c.s==='i');
  const totalAssets = rdy.reduce((a,c)=>a+(c.a||0),0);

  // --- Greetings & small talk (check FIRST before anything else) ---
  if (ql.match(/^(hi|hello|hey|hiya|morning|afternoon|evening|yo|sup|what'?s up|howdy|how are you|how's it going|i want to talk|talk to you|chat|just checking)/))
    return { chat: 'Hey ' + un + '! What are you working on today?', doc: null };

  if (ql.match(/^(thanks|thank you|cheers|ta|nice one|perfect|great|awesome|brilliant|cool|lovely|sorted)/))
    return { chat: 'Anytime! What else can I help with?', doc: null };

  if (ql.match(/^(bye|see you|later|gotta go|logging off)/))
    return { chat: 'See you later, ' + un + '!', doc: null };

  if (ql.match(/good morning|good afternoon|good evening/))
    return { chat: 'Good ' + (new Date().getHours() < 12 ? 'morning' : new Date().getHours() < 17 ? 'afternoon' : 'evening') + ', ' + un + '! What do you need?', doc: null };

  if (ql.match(/how are you|you alright|you good|you ok/))
    return { chat: 'All good here! Ready to help — what do you need?', doc: null };

  if (ql.match(/what.*your name|who are you|what are you/))
    return { chat: 'I\'m Noise Intelligence — the agency knowledge hub. I know all ' + CL.length + ' clients, every asset we\'ve catalogued, and the full team. Ask me anything or tell me to create a document.', doc: null };

  // --- Help ---
  if (ql.match(/help|what can you|what do you do|capabilities|what.*you.*know/))
    return { chat: 'I know all ' + CL.length + ' of our clients, their ' + totalAssets + '+ catalogued assets, campaign history, and Drive folders. I also know the full team. You can ask me things like "what do we have for Davines?" or "who handles motion?" — or tell me to write an email, brief, social copy, presentation, report, proposal, cost allocation, or meeting agenda for any client.', doc: null };

  // --- Client count ---
  if (ql.match(/how many.*client|total.*client|client.*count/))
    return { chat: 'We\'ve got <strong>' + CL.length + ' active clients</strong>. ' + rdy.length + ' are fully ingested with ' + totalAssets + ' assets catalogued, and ' + inv.length + ' have been inventoried from Google Drive but not deep-scanned yet.', doc: null };

  // --- List clients ---
  if (ql.match(/all client|show.*client|list.*client|portfolio|our client|which client/)) {
    return { chat: '<strong>Fully ingested (' + rdy.length + '):</strong> ' + rdy.map(c=>c.n).join(', ') + '.<br><br><strong>Inventoried (' + inv.length + '):</strong> ' + inv.map(c=>c.n).join(', ') + '.', doc: null };
  }

  // --- Asset questions ---
  if (ql.match(/how many.*asset|total.*asset|asset.*count|what assets|what.*do we have/)) {
    if (cm && cm.s==='r') return { chat: cm.n + ' has <strong>' + cm.a + ' assets</strong> across ' + cm.c + ' campaigns. ' + cm.sum, doc: null };
    if (cm && cm.s==='i') return { chat: cm.n + ' has been inventoried from Drive but not deep-scanned yet, so I don\'t have individual file counts. I can see ' + (cm.f?cm.f.length:0) + ' folders though.', doc: null };
    return { chat: 'Across all ingested clients we have <strong>' + totalAssets + ' assets</strong>. The biggest are BARBRI (200+), Brothers Cider (196), Thortful (95), Davines (78), and Boodle (46).', doc: null };
  }

  // --- Campaign questions ---
  if (ql.match(/campaign/)) {
    if (cm && cm.s==='r') return { chat: cm.n + ' has ' + cm.c + ' campaigns with ' + cm.a + ' assets total. ' + cm.sum, doc: null };
    return { chat: 'Campaign breakdown: ' + rdy.filter(c=>c.c>0).map(c => c.n + ' (' + c.c + ')').join(', ') + '. That\'s ' + rdy.reduce((a,c)=>a+(c.c||0),0) + ' campaigns total across ingested clients.', doc: null };
  }

  // --- Team questions ---
  if (ql.match(/team|who.*work|staff|employee|who is|who'?s|who handles|who does/)) {
    const tm = TEAM.find(t => ql.includes(t.name.toLowerCase()));
    if (tm) return { chat: tm.name + ' is our ' + tm.role + '.', doc: null };
    if (ql.match(/motion|video|animation/)) return { chat: 'Motion is handled by Adam (Head of Motion), Luke (Motion Designer), and Leah (Motion Graphic Designer).', doc: null };
    if (ql.match(/design|creative/)) return { chat: 'Creative team: Beau (Creative Director), Steph (Senior Designer), Georgie (Junior Creative), and Leah (Motion Graphic Designer).', doc: null };
    if (ql.match(/account|client.*manage/)) return { chat: 'Louise is Head of Accounts, and Beau handles creative direction across accounts.', doc: null };
    if (ql.match(/paid|media|ads/)) return { chat: 'Dan handles Paid Media.', doc: null };
    if (ql.match(/production|produce/)) return { chat: 'Mike is Head of Production.', doc: null };
    if (ql.match(/operations|ops/)) return { chat: 'Sam is Head of Operations.', doc: null };
    if (ql.match(/social/)) return { chat: 'Obenewa Adu is our Social Media Intern.', doc: null };
    if (ql.match(/founder|boss|owner|ceo|lead/)) return { chat: 'Anthony and Joe are the Co-Founders of Noise Media.', doc: null };
    return { chat: 'The team (' + TEAM.length + '): ' + TEAM.map(t => t.name + ' (' + t.role + ')').join(', ') + '.', doc: null };
  }

  // --- About Noise ---
  if (ql.match(/what do we do|about noise|what.*noise.*do|our services|what services|what.*we.*offer/))
    return { chat: 'Noise Media is a creative agency specialising in paid social, content production, and brand storytelling. We do content strategy, creative production, paid social management, UGC/influencer campaigns, and community management — currently working with ' + CL.length + ' clients across beauty, drinks, fintech, hospitality, and more.', doc: null };

  // --- Category / sector ---
  if (ql.match(/beauty|drinks|fintech|hospitality|food|fashion|tech|energy|entertainment|luxury|automotive|travel|storage|skincare|haircare/)) {
    var catMatch = ql.match(/beauty|drinks|fintech|hospitality|food|fashion|tech|energy|entertainment|luxury|automotive|travel|storage|skincare|haircare/);
    if (catMatch) {
      var cats = CL.filter(c => c.cat && c.cat.toLowerCase().includes(catMatch[0]));
      if (cats.length) return { chat: cats.length + ' client' + (cats.length>1?'s':'') + ' in that space: ' + cats.map(c=>c.n + ' (' + c.cat + ')').join(', ') + '.', doc: null };
    }
  }

  // --- Specific client (ready) ---
  if (cm && cm.s==='r')
    return { chat: '<strong>' + cm.n + '</strong> — ' + cm.cat + '. ' + cm.sum + '<br><br>' + cm.a + ' assets, ' + cm.c + ' campaigns. Want me to create something for them?', doc: null };

  // --- Specific client (inventoried) ---
  if (cm && cm.s==='i') {
    var r = '<strong>' + cm.n + '</strong> — ' + cm.cat + '. Inventoried from Drive';
    if (cm.f && cm.f.length) r += ' (' + cm.f.length + ' folders: ' + cm.f.join(', ') + ')';
    r += '. Not fully ingested yet — I have the folder structure but not individual files.';
    return { chat: r, doc: null };
  }

  // --- Vague / conversational fallbacks ---
  if (ql.match(/i need|can you|could you|i want|please|would you/))
    return { chat: 'Of course — what do you need? If it\'s about a specific client, just mention their name and I\'ll pull up everything I know.', doc: null };

  if (ql.match(/idea|suggest|recommend|what should/))
    return { chat: 'What client or project are you thinking about? I can pull up their assets and campaigns, or help you draft something.', doc: null };

  if (ql.match(/busy|deadline|stressed|rush|urgent/))
    return { chat: 'Let\'s get it done — which client and what do you need? I can generate docs fast.', doc: null };

  // --- True fallback ---
  return { chat: 'Not sure I caught that, ' + un + '. Try mentioning a client name, or ask me something like "what assets do we have for Davines?" or "write an email to BARBRI."', doc: null };
}

  bg.onclick = function(e) { if (e.target === bg) bg.remove(); };

    '<p>Connect a Claude API key to enable fully conversational AI. Without it, the bot uses a built-in keyword engine (limited).</p>' +

    '<div class="modal-btns">' +
    '<button class="btn-cancel" onclick="this.closest(\'.modal-bg\').remove()">Cancel</button>' +

}

function saveApiKey() {
  var key = document.getElementById('apiKeyInput').value.trim();
  AI_KEY = key;
  conversationHistory = [];
  document.querySelector('.modal-bg').remove();
  // Update status indicator
  updateAiBadge();
}

function updateAiBadge() {
  var el = document.getElementById('aiBadge');
  if (!el) {
    el = document.createElement('span');
    el.id = 'aiBadge';
    document.querySelector('.header-title').appendChild(el);
  }
  if (AI_KEY) {
    el.className = 'ai-badge ai-on';
    el.textContent = 'AI';
  } else {
    el.className = 'ai-badge ai-off';
    el.textContent = 'OFFLINE';
  }
}
updateAiBadge();
</script>
</body>
</html>
